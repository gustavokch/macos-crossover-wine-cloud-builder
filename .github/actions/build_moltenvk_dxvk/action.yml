name: 'Build and Install MoltenVK and DXVK'
description: 'Action that builds MoltenVK and DXVK and bundles them in a common installation'
inputs:
  crossover-source:
    description: 'Path to the crossover source (i.e. the directory that contains the "moltenvk" and "dxvk" directories'
    required: true
    default: ${{ github.workspace }}/sources
  install-prefix:
    description: 'Installation target directory for MoltenVK and DXVK'
    required: true
    # default: ${{ env.INSTALLROOT }}/${{ env.MOLTENVK_DXVK_INSTALLATION }}
runs:
  using: "composite"
  steps:
    ############ Build and Install MoltenVK ##############
    - name: Set up Python 3.11 (includes distutils)
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Repoint stale pinned SPIRV-Cross commit
      # The CrossOver source tarball ships its own patched copy of
      # MoltenVK's fetchDependencies script, which pinned SPIRV-Cross to
      # a specific commit on a fork (gustavokch/SPIRV-Cross). That fork's
      # history was rewritten and the pinned commit is no longer reachable,
      # which surfaces as "fatal: unable to read tree <sha>" mid-build.
      #
      # This step repoints that exact stale pin, wherever it's referenced
      # under the moltenvk/ checkout, to the fork's current default-branch
      # HEAD, so fetchDependencies can proceed.
      #
      # NOTE: this targets the specific stale commit/fork identified from
      # the failing build log. If CodeWeavers changes the pin again (a
      # different fork, a different stale commit), OLD_SHA/OLD_URL below
      # will need updating to match. It deliberately does NOT abort the
      # step on "not found" — grep/ls-remote returning no match is treated
      # as informational, not fatal, since `bash` steps in Actions run
      # with `-e`/pipefail by default and would otherwise kill the whole
      # step on a simple "no matches" result.
      #
      # This is a best-effort mitigation, not a guarantee the replacement
      # commit contains the same fix the original pin was chosen for. If
      # MoltenVK's build fails later with something SPIRV-Cross-related,
      # the pin likely needs to be re-chosen by hand instead.
      shell: bash
      run: |
        set +e
        set -x
        cd ${{ inputs.crossover-source }}/moltenvk

        OLD_SHA="d52dc12d8237ad031137850b682b38201736206c"
        OLD_URL="https://github.com/gustavokch/SPIRV-Cross.git"

        # Only bother if that exact commit is actually unreachable on the
        # pinned fork (cheap check, avoids needlessly repointing a pin
        # that's still fine).
        git fetch --depth=1 "$OLD_URL" "$OLD_SHA" > /dev/null 2>&1
        if [ $? -eq 0 ]; then
          echo "Pinned commit $OLD_SHA is still reachable on $OLD_URL — nothing to do."
          exit 0
        fi

        NEW_SHA="$(git ls-remote "$OLD_URL" HEAD 2>/dev/null | cut -f1)"
        if [ -z "$NEW_SHA" ]; then
          echo "::error::Could not resolve current HEAD of $OLD_URL to repoint the stale SPIRV-Cross pin."
          exit 1
        fi

        echo "Repointing stale SPIRV-Cross pin: $OLD_SHA -> $NEW_SHA"

        MATCHES="$(grep -rl "$OLD_SHA" . 2>/dev/null)"
        if [ -z "$MATCHES" ]; then
          echo "::warning::Stale commit $OLD_SHA is unreachable on $OLD_URL, but no file under moltenvk/ references it literally — the pin may be constructed dynamically (e.g. from variables) and can't be patched this way. Build will likely still fail; the fetchDependencies script itself needs inspecting."
          exit 0
        fi

        echo "$MATCHES" | while IFS= read -r f; do
          sed -i.bak "s/$OLD_SHA/$NEW_SHA/g" "$f" && rm -f "$f.bak"
          echo "Patched: $f"
        done

        set -e

    - name: Build MoltenVK
      shell: bash
      run: |
        pushd ${{ inputs.crossover-source }}/moltenvk
        python3 -m pip install --user setuptools --break-system-packages
        ./fetchDependencies --macos
        make macos
        popd
    - name: Install MoltenVK
      shell: bash
      run: |
        set -x
        pushd ${{ inputs.crossover-source }}/moltenvk/Package/Latest/MoltenVK
        mkdir -p ${{ inputs.install-prefix }}/usr/local/lib/
        cp ./dylib/macOS/*.dylib ${{ inputs.install-prefix }}/usr/local/lib/
        cp -r ./include ${{ inputs.install-prefix }}/usr/local/
        popd
        # also copy the spirv-headers as VKD3D seems to need them for building
        pushd ${{ inputs.crossover-source }}/moltenvk/External/glslang/External/spirv-tools/external/spirv-headers/include/
        cp -r ./spirv ${{ inputs.install-prefix }}/usr/local/include/
        popd
    ############ Build and Install DXVK ##############
    - name: Get latest HomeBrew formulas/bottles
      shell: bash
      run: |
        brew update
    - name: Install Dependencies for DXVK
      shell: bash
      run: |
        brew install  glslang   \
                      mingw-w64 \
                      meson
    - name: Build DXVK
      shell: bash
      run: |
        set -x
        pushd ${{ inputs.crossover-source }}/dxvk
        ./package-release.sh master ${{ inputs.crossover-source }}/dxvk/install --no-package
        popd
    - name: Install DXVK
      shell: bash
      run: |
        set -x
        pushd ${{ inputs.crossover-source }}/dxvk/install/dxvk-macOS-master
        echo Installing DXVK dlls...
        mkdir -p ${{ inputs.install-prefix }}/usr/local/lib64/wine
        cp -r x64 ${{ inputs.install-prefix }}/usr/local/lib64/wine/dxvk
        echo Installing DXVK setup script...
        mkdir -p ${{ inputs.install-prefix }}/usr/local/bin
        cp setup_dxvk.sh ${{ inputs.install-prefix }}/usr/local/bin/
        popd
